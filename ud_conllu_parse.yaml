task: ud_conllu_parse
task_alias: UD CoNLL-U Parsing (LAS/UAS)
tag:
  - dependency_parsing
  - conllu
  - generative

dataset_path: json
output_type: generate_until
custom_dataset: !function utils.load_local_jsonl_splits
training_split: train
validation_split: dev
test_split: test
fewshot_split: train
num_fewshot: 3
fewshot_config:
  sampler: first_n
  split: train

description: |
  You are a Universal Dependencies parser.
  For each sentence you will be given the exact token list with IDs.
  Output exactly one line per token, in this format:
  ID^FORM^LEMMA^UPOS^XPOS^FEATS^HEAD^DEPREL

  Rules:
  - Use "^" as the column separator.
  - Output exactly the tokens listed, in the same order, with the same IDs.
  - Do not add, skip, merge, or reorder tokens.
  - HEAD is the integer ID of the governing token (0 for root).
  - FEATS uses "=" and "|" internally (e.g. Number=Sing|Person=3); never use "^" inside a field.
  - Output one line per token, no blank lines, no comments, no extra text.


doc_to_text: !function utils.doc_to_text
doc_to_target: !function utils.doc_to_target
process_results: !function utils.process_results

metric_list:
  - metric: uas
    aggregation: mean
    higher_is_better: true
  - metric: las
    aggregation: mean
    higher_is_better: true

generation_kwargs:
  until:
    - "</s>"
    - "<|im_end|>"
    - "<|eot_id|>"
  do_sample: false
  temperature: 0.0
  max_gen_toks: 1024

metadata:
  version: 1.0
  train_file: ./data/UD_English-EWT/en_ewt-ud-train_conv2.jsonl
  dev_file: ./data/UD_English-EWT/en_ewt-ud-dev_conv2.jsonl
  test_file: ./data/UD_English-EWT/en_ewt-ud-test_conv2.jsonl
